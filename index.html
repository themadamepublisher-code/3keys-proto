s kDot{0%,100%{opacity:.4}50%{opacity:1}}\n  @keyframes kBar{from{width:0}to{width:var(--w)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100dvh;width:100vw;position:relative;overflow:hidden;background:#0c2825\">\n\n  <!-- ===== PASSWORD GATE ===== -->\n  <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute;inset:0;z-index:999;background:radial-gradient(130% 100% at 50% 0%, #17423d 0%, #0d2926 55%, #081d1b 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 30px\">\n      <div style=\"position:relative;margin-bottom:26px\">\n        <div style=\"position:absolute;inset:-24px;border-radius:50%;background:radial-gradient(circle,rgba(201,151,58,.28),transparent 70%);animation:kGlow 6s ease-in-out infinite\"><\u002Fdiv>\n        <img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"position:relative;width:70px;filter:drop-shadow(0 8px 22px rgba(201,151,58,.4))\">\n      <\u002Fdiv>\n      <div style=\"font-family:'Cinzel',serif;font-weight:800;letter-spacing:.2em;font-size:14px;color:#E4C079;margin-bottom:20px\">3KEES<\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:28px;line-height:1.2;margin:0 0 10px;color:#F7F4EF\">A private preview<\u002Fh1>\n      <p style=\"margin:0 0 26px;font-size:14.5px;line-height:1.55;color:rgba(247,244,239,.6);max-width:280px\">Enter the access word to open the 3KEES prototype.<\u002Fp>\n      <div style=\"width:100%;max-width:320px\">\n        <input value=\"{{ pwInput }}\" oninput=\"{{ onPw }}\" onkeydown=\"{{ onPwKey }}\" type=\"password\" placeholder=\"Access word\" style=\"{{ pwBoxStyle }}\">\n        <div style=\"{{ pwErrStyle }}\">That's not quite it — try again.<\u002Fdiv>\n        <button onclick=\"{{ submitPw }}\" style=\"{{ primaryBtn }}; margin-top:16px\">Unlock<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:7px;margin-top:22px;font-size:11px;color:rgba(247,244,239,.4)\">\n        <span style=\"width:6px;height:6px;border-radius:50%;border:1px solid rgba(123,168,153,.8)\"><\u002Fspan>Confidential concept · please don't share\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n\n  \n  <!-- ===== HANDOFF / FLOW-MAP PANEL ===== -->\n  <sc-if value=\"{{ showMap }}\" hint-placeholder-val=\"{{ true }}\">\n  <aside style=\"width:250px;position:sticky;top:44px;display:flex;flex-direction:column;gap:18px\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" alt=\"3KEES key\" style=\"width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(201,151,58,.4))\">\n      <div>\n        <div style=\"font-family:'Cinzel',serif;font-weight:800;letter-spacing:.14em;font-size:16px;color:#E4C079;line-height:1\">3KEES<\u002Fdiv>\n        <div style=\"font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(247,244,239,.45);margin-top:3px\">Legacy Locker · concept<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0;font-size:11.5px;line-height:1.6;color:rgba(247,244,239,.5)\">A calm, guided legacy-readiness prototype. Tap any screen to jump — flows are grouped as they'd map into Figma.<\u002Fp>\n\n    <sc-for list=\"{{ mapGroups }}\" as=\"g\" hint-placeholder-count=\"6\">\n      <div style=\"display:flex;flex-direction:column;gap:5px\">\n        <div style=\"font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:rgba(201,151,58,.7);font-weight:600;margin:6px 0 2px\">{{ g.name }}<\u002Fdiv>\n        <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ nav }}\" data-screen=\"{{ it.id }}\" style=\"{{ it.style }}\">\n            <span style=\"width:5px;height:5px;border-radius:2px;background:{{ it.dot }};flex:none\"><\u002Fspan>\n            <span style=\"flex:1;text-align:left\">{{ it.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <button onclick=\"{{ restart }}\" style=\"margin-top:6px;padding:9px;border-radius:10px;border:1px solid rgba(247,244,239,.16);background:transparent;color:rgba(247,244,239,.55);font:500 11px Inter,sans-serif;cursor:pointer\">↺ Restart journey<\u002Fbutton>\n  <\u002Faside>\n  <\u002Fsc-if>\n\n  <!-- ===== DEVICE (full-bleed mobile) ===== -->\n  <div style=\"position:absolute;inset:0\">\n    <div style=\"position:absolute;inset:0\">\n      <div onmousemove=\"{{ onMove }}\" onmouseleave=\"{{ onLeave }}\" class=\"k-scroll\" style=\"position:relative;width:100%;height:100%;border-radius:0;overflow:hidden;background:#0c2825\">\n\n        <!-- status bar -->\n        <div style=\"position:absolute;top:0;left:0;right:0;height:52px;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:0 30px;pointer-events:none;font-size:13px;font-weight:600;color:{{ statusColor }}\">\n\n        <\u002Fdiv>\n\n        <!-- ============ ONBOARDING SHELL (parallax) ============ -->\n        <sc-if value=\"{{ is.onboarding }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;inset:0;background:radial-gradient(130% 100% at 50% 0%, #17423d 0%, #0d2926 50%, #081d1b 100%);overflow:hidden\">\n            <!-- bg layer: keyhole silhouette -->\n            <div style=\"position:absolute;inset:-40px;display:flex;align-items:center;justify-content:center;opacity:.5;transform:{{ tBg }};transition:transform .35s ease-out\">\n              <svg width=\"360\" height=\"500\" viewBox=\"0 0 360 500\" style=\"filter:blur(1px)\">\n                <circle cx=\"180\" cy=\"180\" r=\"120\" fill=\"none\" stroke=\"rgba(201,151,58,.16)\" stroke-width=\"2\"><\u002Fcircle>\n                <circle cx=\"180\" cy=\"180\" r=\"60\" fill=\"rgba(201,151,58,.05)\"><\u002Fcircle>\n                <path d=\"M155 220 L205 220 L228 380 L132 380 Z\" fill=\"none\" stroke=\"rgba(201,151,58,.14)\" stroke-width=\"2\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <!-- mid layer: drifting heirloom keys -->\n            <sc-if value=\"{{ driftKeys }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:absolute;inset:0;transform:{{ tMid }};transition:transform .35s ease-out\">\n              <img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"position:absolute;top:88px;right:26px;width:54px;opacity:.13;animation:kDrift1 11s ease-in-out infinite\">\n              <img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"position:absolute;bottom:150px;left:20px;width:38px;opacity:.1;animation:kDrift2 14s ease-in-out infinite\">\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <!-- glow layer -->\n            <div style=\"position:absolute;top:-60px;left:50%;width:340px;height:340px;margin-left:-170px;border-radius:50%;background:radial-gradient(circle, rgba(201,151,58,.22), transparent 68%);transform:{{ tGlow }};animation:kGlow 8s ease-in-out infinite;transition:transform .35s ease-out\"><\u002Fdiv>\n\n            <!-- foreground -->\n            <div style=\"position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:60px 26px 30px\">\n              <!-- top bar -->\n              <div style=\"display:flex;align-items:center;justify-content:space-between;height:34px;margin-bottom:6px\">\n                <sc-if value=\"{{ canBack }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ back }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid rgba(247,244,239,.18);background:rgba(247,244,239,.05);color:#F7F4EF;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center\">‹<\u002Fbutton>\n                <\u002Fsc-if>\n                <div style=\"flex:1;display:flex;gap:7px;justify-content:center;align-items:center\">\n                  <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"10\">\n                    <span style=\"{{ d.style }}\"><\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <button onclick=\"{{ nav }}\" data-screen=\"home\" style=\"background:none;border:none;color:rgba(247,244,239,.5);font:500 13px Inter,sans-serif;cursor:pointer\">Skip<\u002Fbutton>\n              <\u002Fdiv>\n\n              <div class=\"k-scroll\" style=\"flex:1;overflow-y:auto;display:flex;flex-direction:column\">\n\n                <!-- 1 · WELCOME -->\n                <sc-if value=\"{{ is.welcome }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;animation:kUp .7s ease\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 6px\">\n                      <div style=\"position:relative;margin-bottom:22px;transform:{{ tLogo }};transition:transform .25s ease-out\">\n                        <div style=\"position:absolute;inset:-26px;border-radius:50%;background:radial-gradient(circle,rgba(201,151,58,.3),transparent 70%);animation:kGlow 6s ease-in-out infinite\"><\u002Fdiv>\n                        <img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"position:relative;width:82px;filter:drop-shadow(0 8px 24px rgba(201,151,58,.4));animation:kUp 1s ease\"><\u002Fdiv>\n                      <div style=\"font-family:'Cinzel',serif;font-weight:800;letter-spacing:.2em;font-size:15px;color:#E4C079;margin-bottom:24px\">3KEES<\u002Fdiv>\n                      <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:34px;line-height:1.15;margin:0 0 12px;color:#F7F4EF\">Welcome to 3KEES<\u002Fh1>\n                      <p style=\"margin:0 0 8px;font-size:15px;line-height:1.55;color:rgba(247,244,239,.62);max-width:280px\">A calm, private place to organize what matters — three Keys at a time.<\u002Fp>\n                    <\u002Fdiv>\n                    <div style=\"padding-top:8px\">\n                      <label style=\"display:block;font-size:12.5px;font-weight:500;color:rgba(247,244,239,.6);margin-bottom:9px\">What should we call you?<\u002Flabel>\n                      <input value=\"{{ name }}\" oninput=\"{{ onName }}\" placeholder=\"Your first name\" style=\"width:100%;padding:16px 18px;border-radius:15px;border:1px solid rgba(201,151,58,.3);background:rgba(247,244,239,.06);color:#F7F4EF;font:500 16px Inter,sans-serif;outline:none;margin-bottom:14px\">\n                      <button onclick=\"{{ nav }}\" data-screen=\"checkin\" style=\"{{ primaryBtn }}\">Looks good<\u002Fbutton>\n                      <div style=\"display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;font-size:11px;color:rgba(247,244,239,.4)\">\n                        <span style=\"width:6px;height:6px;border-radius:50%;border:1px solid rgba(123,168,153,.8)\"><\u002Fspan>Private &amp; encrypted. Nothing is shared without your say-so.\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 2 · EMOTIONAL CHECK-IN -->\n                <sc-if value=\"{{ is.checkin }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"animation:kUp .6s ease;padding-top:10px\">\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:29px;line-height:1.22;margin:0 0 10px\">How are you feeling about organizing your legacy?<\u002Fh1>\n                    <p style=\"margin:0 0 26px;font-size:14px;line-height:1.55;color:rgba(247,244,239,.55)\">There's no wrong answer. This just helps us set the right pace.<\u002Fp>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:11px\">\n                      <sc-for list=\"{{ emotions }}\" as=\"e\" hint-placeholder-count=\"6\">\n                        <button onclick=\"{{ pickEmotion }}\" data-id=\"{{ e.id }}\" style=\"{{ e.style }}\">{{ e.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:auto;padding-top:34px\">\n                      <button onclick=\"{{ nav }}\" data-screen=\"reassurance\" disabled=\"{{ emotionLock }}\" style=\"{{ emotionBtn }}\">Next<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 3 · REASSURANCE -->\n                <sc-if value=\"{{ is.reassurance }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;animation:kUp .6s ease\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0\">\n                      <div style=\"width:46px;height:46px;border-radius:50%;border:1px solid rgba(201,151,58,.4);display:flex;align-items:center;justify-content:center;margin-bottom:22px\">\n                        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"9\" r=\"4\" fill=\"none\" stroke=\"#E4C079\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M9.5 12 L14.5 12 L16 21 L8 21 Z\" fill=\"none\" stroke=\"#E4C079\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fdiv>\n                      <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:31px;line-height:1.18;margin:0 0 16px\">{{ reassureTitle }}<\u002Fh1>\n                      <p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(247,244,239,.72)\">{{ reassureBody }}<\u002Fp>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"whatis\" style=\"{{ primaryBtn }}\">Next<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 4 · WHAT 3KEES DOES -->\n                <sc-if value=\"{{ is.whatis }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"animation:kUp .6s ease;padding-top:6px;display:flex;flex-direction:column;flex:1\">\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:28px;line-height:1.22;margin:0 0 8px\">What 3KEES does<\u002Fh1>\n                    <p style=\"margin:0 0 22px;font-size:14px;line-height:1.55;color:rgba(247,244,239,.6)\">It helps you organize the accounts, documents, people, wishes, and instructions your loved ones may need someday.<\u002Fp>\n                    <div style=\"position:relative;flex:1;min-height:300px\">\n                      <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"3\">\n                        <div style=\"{{ p.style }}\">\n                          <div style=\"display:flex;align-items:center;gap:12px\">\n                            <span style=\"width:38px;height:38px;border-radius:11px;background:{{ p.badge }};display:flex;align-items:center;justify-content:center;flex:none\"><span style=\"width:11px;height:11px;border-radius:{{ p.shape }};border:1.6px solid {{ p.mark }}\"><\u002Fspan><\u002Fspan>\n                            <div>\n                              <div style=\"font-size:16px;font-weight:600;color:#F7F4EF\">{{ p.title }}<\u002Fdiv>\n                              <div style=\"font-size:12.5px;color:rgba(247,244,239,.55);margin-top:2px\">{{ p.sub }}<\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"coreloop\" style=\"{{ primaryBtn }}\">Next<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 5 · CORE LOOP -->\n                <sc-if value=\"{{ is.coreloop }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"animation:kUp .6s ease;padding-top:6px;display:flex;flex-direction:column;flex:1\">\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:28px;line-height:1.2;margin:0 0 8px\">How a Key works<\u002Fh1>\n                    <p style=\"margin:0 0 26px;font-size:14px;line-height:1.55;color:rgba(247,244,239,.6)\">Every Key is just three small decisions. That's the whole loop.<\u002Fp>\n                    <div style=\"flex:1;display:flex;flex-direction:column;gap:14px\">\n                      <sc-for list=\"{{ loopSteps }}\" as=\"l\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex;align-items:center;gap:16px;padding:18px;border-radius:18px;background:rgba(247,244,239,.05);border:1px solid rgba(247,244,239,.1);animation:kUp .6s ease both;animation-delay:{{ l.delay }}\">\n                          <div style=\"width:40px;height:40px;border-radius:50%;border:1px solid rgba(201,151,58,.5);color:#E4C079;font-family:'Cinzel',serif;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex:none\">{{ l.n }}<\u002Fdiv>\n                          <div style=\"flex:1\">\n                            <div style=\"font-size:16px;font-weight:600\">{{ l.title }}<\u002Fdiv>\n                            <div style=\"font-size:12.5px;color:rgba(247,244,239,.55);margin-top:2px\">{{ l.sub }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"guide\" style=\"{{ primaryBtn }}\">Start with one Key<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 6 · GUIDE REASSURANCE -->\n                <sc-if value=\"{{ is.guideintro }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;animation:kUp .6s ease\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center\">\n                      <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:30px;line-height:1.2;margin:0 0 24px\">You'll never have to figure this out alone.<\u002Fh1>\n                      <div style=\"display:flex;gap:12px;align-items:flex-end;margin-bottom:16px\">\n                        <div style=\"width:42px;height:42px;border-radius:50%;background:linear-gradient(150deg,#C9973A,#8a6220);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 18px rgba(201,151,58,.3)\"><img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"width:22px;filter:brightness(0) invert(1);opacity:.92\"><\u002Fdiv>\n                        <div style=\"background:rgba(247,244,239,.07);border:1px solid rgba(201,151,58,.2);border-radius:20px 20px 20px 6px;padding:16px 18px;font-family:'Cormorant Infant',serif;font-size:19px;line-height:1.45;color:#F7ECD4\">Your 3KEES Guide helps you decide what to add, who should know, and when it should unlock.<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font-size:11px;color:rgba(247,244,239,.4);margin-left:54px\">Your Guide · always here, never pushy<\u002Fdiv>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"choosepath\" style=\"{{ primaryBtn }}\">Next<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 7 · CHOOSE FIRST PATH? -->\n                <sc-if value=\"{{ is.choosepath }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;animation:kUp .6s ease;padding-top:10px\">\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:29px;line-height:1.2;margin:0 0 26px\">Would you like to choose your first Key Path?<\u002Fh1>\n                    <div style=\"display:flex;flex-direction:column;gap:12px\">\n                      <button onclick=\"{{ pickChoice }}\" data-val=\"yes\" style=\"{{ choiceYesStyle }}\"><span style=\"font-size:15.5px;font-weight:600\">Yes, choose my first Key Path<\u002Fspan><span style=\"font-size:12.5px;color:rgba(247,244,239,.55);margin-top:3px;display:block\">A short activity points you to the best start<\u002Fspan><\u002Fbutton>\n                      <button onclick=\"{{ pickChoice }}\" data-val=\"no\" style=\"{{ choiceNoStyle }}\"><span style=\"font-size:15.5px;font-weight:600\">No, I'll choose later<\u002Fspan><span style=\"font-size:12.5px;color:rgba(247,244,239,.55);margin-top:3px;display:block\">Go straight to your Legacy Locker<\u002Fspan><\u002Fbutton>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:auto;padding-top:30px\">\n                      <button onclick=\"{{ choiceNext }}\" disabled=\"{{ choiceLock }}\" style=\"{{ choiceBtn }}\">Continue<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 8 · ACTIVITY INTRO -->\n                <sc-if value=\"{{ is.activityintro }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center;animation:kUp .6s ease\">\n                    <div style=\"width:64px;height:64px;border-radius:50%;border:1px solid rgba(201,151,58,.4);display:flex;align-items:center;justify-content:center;margin-bottom:24px;position:relative\"><div style=\"position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(201,151,58,.15)\"><\u002Fdiv><span style=\"font-family:'Cinzel',serif;font-weight:800;color:#E4C079;font-size:22px\">3<\u002Fspan><\u002Fdiv>\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:28px;line-height:1.25;margin:0 0 14px;max-width:290px\">This quick activity helps us recommend where to start.<\u002Fh1>\n                    <p style=\"margin:0 0 34px;font-size:15px;line-height:1.6;color:rgba(247,244,239,.6);max-width:280px\">Answer a few simple questions so 3KEES can suggest your first path. Takes about a minute.<\u002Fp>\n                    <button onclick=\"{{ nav }}\" data-screen=\"personalization\" style=\"{{ primaryBtn }}\">Begin<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 9 · PERSONALIZATION CHIPS -->\n                <sc-if value=\"{{ is.personalization }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"animation:kUp .6s ease;padding-top:6px;display:flex;flex-direction:column;flex:1\">\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:25px;line-height:1.25;margin:0 0 6px\">When it comes to organizing important life information, what usually gets in your way?<\u002Fh1>\n                    <p style=\"margin:0 0 20px;font-size:13px;color:rgba(247,244,239,.5)\">Choose any that feel true. There's no judgment here.<\u002Fp>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px\">\n                      <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"12\">\n                        <button onclick=\"{{ pickChip }}\" data-id=\"{{ c.id }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"paths\" style=\"{{ primaryBtn }}\">Show my paths<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 10 · RECOMMENDED PATHS -->\n                <sc-if value=\"{{ is.paths }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"animation:kUp .6s ease;padding-top:6px;display:flex;flex-direction:column;flex:1\">\n                    <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(201,151,58,.75);font-weight:600;margin-bottom:6px\">Recommended 3 · for your Locker<\u002Fdiv>\n                    <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:26px;line-height:1.2;margin:0 0 20px\">Recommended for your Legacy Locker<\u002Fh1>\n                    <div style=\"display:flex;flex-direction:column;gap:13px\">\n                      <sc-for list=\"{{ pathCards }}\" as=\"p\" hint-placeholder-count=\"3\">\n                        <button onclick=\"{{ pickPath }}\" data-id=\"{{ p.id }}\" style=\"{{ p.style }}\">\n                          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px\">\n                            <div style=\"width:36px;height:36px;border-radius:10px;background:rgba(201,151,58,.15);border:1px solid rgba(201,151,58,.35);display:flex;align-items:center;justify-content:center;flex:none\"><span style=\"width:10px;height:10px;border-radius:{{ p.shape }};border:1.6px solid #E4C079\"><\u002Fspan><\u002Fdiv>\n                            <span style=\"font-size:10.5px;font-weight:600;color:rgba(247,244,239,.6);border:1px solid rgba(247,244,239,.2);border-radius:999px;padding:4px 10px;white-space:nowrap\">{{ p.badge }}<\u002Fspan>\n                          <\u002Fdiv>\n                          <div style=\"font-size:17px;font-weight:600;margin-top:13px;text-align:left\">{{ p.title }}<\u002Fdiv>\n                          <div style=\"font-size:13px;line-height:1.5;color:rgba(247,244,239,.6);margin-top:5px;text-align:left\">{{ p.sub }}<\u002Fdiv>\n                          <div style=\"{{ p.cta }}\">{{ p.ctaLabel }}<\u002Fdiv>\n                        <\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ nav }}\" data-screen=\"home\" style=\"background:none;border:none;color:rgba(247,244,239,.55);font:500 13px Inter,sans-serif;padding:20px 0 4px;cursor:pointer;text-decoration:underline;text-underline-offset:3px\">See all Key Paths<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 11 · HOME DASHBOARD ============ -->\n        <sc-if value=\"{{ is.home }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;overflow:hidden\">\n            <div class=\"k-scroll\" style=\"position:absolute;inset:0;overflow-y:auto;padding:60px 20px 100px;animation:kFade .5s ease\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n                <div>\n                  <div style=\"font-size:12.5px;color:#8a857c\">Good afternoon,<\u002Fdiv>\n                  <div style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:26px;line-height:1.1;text-transform:capitalize\">{{ displayName }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"position:relative;width:44px;height:44px;border-radius:50%;background:linear-gradient(150deg,#2f6d5f,#1B4F4A);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px\">{{ initial }}<span style=\"position:absolute;top:-1px;right:-1px;width:12px;height:12px;border-radius:50%;background:#C9973A;border:2px solid #F7F4EF\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"background:linear-gradient(160deg,#1B4F4A,#123b36);border-radius:22px;padding:20px;color:#F7F4EF;box-shadow:0 18px 40px -20px rgba(27,79,74,.6);margin-bottom:14px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n                  <div style=\"font-family:'Cinzel',serif;font-weight:800;letter-spacing:.1em;font-size:15px;color:#E4C079\">YOUR FIRST 3 KEYS<\u002Fdiv>\n                  <span style=\"font-size:11px;color:rgba(247,244,239,.6)\">1 of 3 started<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <sc-for list=\"{{ firstKeys }}\" as=\"k\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ nav }}\" data-screen=\"{{ k.target }}\" style=\"{{ k.card }}\">\n                      <div style=\"display:flex;align-items:center;gap:13px\">\n                        <span style=\"{{ k.badge }}\"><span style=\"width:14px;height:14px;border-radius:50%;border:2px solid {{ k.badgeInner }}\"><\u002Fspan><\u002Fspan>\n                        <div style=\"flex:1;min-width:0\">\n                          <div style=\"font-size:15px;font-weight:600;color:{{ k.titleColor }}\">{{ k.title }}<\u002Fdiv>\n                          <div style=\"font-size:12px;color:#8a857c;margin-top:1px\">{{ k.sub }}<\u002Fdiv>\n                        <\u002Fdiv>\n                        <span style=\"{{ k.pill }}\">{{ k.status }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <button onclick=\"{{ nav }}\" data-screen=\"choosekeeper\" style=\"width:100%;text-align:left;display:flex;align-items:center;gap:12px;background:rgba(201,151,58,.14);border:1px solid rgba(201,151,58,.4);border-radius:16px;padding:15px;cursor:pointer;margin-bottom:26px\">\n                <span style=\"width:34px;height:34px;border-radius:10px;background:#C9973A;display:flex;align-items:center;justify-content:center;flex:none;color:#12332F;font-weight:700\">✦<\u002Fspan>\n                <div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:600;color:#8a6220\">You're 1 step from sealing your first Key<\u002Fdiv><div style=\"font-size:12px;color:#a08640;margin-top:1px\">Choose a Keeper to continue<\u002Fdiv><\u002Fdiv>\n                <span style=\"color:#8a6220;font-size:18px\">›<\u002Fspan>\n              <\u002Fbutton>\n\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n                <div style=\"font:600 11px Inter,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#1B4F4A\">Explore your Legacy Locker<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:26px\">\n                <sc-for list=\"{{ exploreCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ nav }}\" data-screen=\"keys\" style=\"display:flex;flex-direction:column;gap:9px;padding:14px 12px;background:#fff;border:1px solid rgba(28,28,30,.08);border-radius:16px;cursor:pointer;text-align:left\">\n                    <span style=\"width:30px;height:30px;border-radius:9px;background:rgba(27,79,74,.08);display:flex;align-items:center;justify-content:center\"><span style=\"width:11px;height:11px;border-radius:{{ c.shape }};border:1.6px solid #1B4F4A\"><\u002Fspan><\u002Fspan>\n                    <div style=\"font-size:13px;font-weight:600\">{{ c.label }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:#a8a49b\">{{ c.n }} items<\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid rgba(28,28,30,.08);border-radius:20px;padding:18px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                  <div style=\"font:600 11px Inter,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#1B4F4A\">Getting Started<\u002Fdiv>\n                  <span style=\"font-size:11px;color:#8a857c\">{{ doneCount }} of 6 done<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:3px\">\n                  <sc-for list=\"{{ checklist }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <button onclick=\"{{ toggleCheck }}\" data-i=\"{{ c.i }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;padding:9px 0;cursor:pointer\">\n                      <span style=\"{{ c.box }}\">✓<\u002Fspan>\n                      <span style=\"{{ c.text }}\">{{ c.label }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ KEYS TAB ============ -->\n        <sc-if value=\"{{ is.keys }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E\">\n            <div class=\"k-scroll\" style=\"position:absolute;inset:0;overflow-y:auto;padding:64px 20px 100px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:28px;margin:0 0 4px\">Your Keys<\u002Fh1>\n              <p style=\"margin:0 0 20px;font-size:13.5px;color:#8a857c\">Three Keys started. Add another whenever you're ready.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:20px\">\n                <sc-for list=\"{{ firstKeys }}\" as=\"k\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ nav }}\" data-screen=\"{{ k.target }}\" style=\"text-align:left;width:100%;padding:16px;border-radius:18px;border:1px solid rgba(28,28,30,.09);background:#fff;cursor:pointer;display:flex;align-items:center;gap:13px\">\n                    <span style=\"{{ k.badge }}\"><span style=\"width:14px;height:14px;border-radius:50%;border:2px solid {{ k.badgeInner }}\"><\u002Fspan><\u002Fspan>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-size:15px;font-weight:600;color:{{ k.titleColor }}\">{{ k.title }}<\u002Fdiv><div style=\"font-size:12px;color:#8a857c;margin-top:1px\">{{ k.sub }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"{{ k.pill }}\">{{ k.status }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ nav }}\" data-screen=\"addkey\" style=\"{{ primaryBtn }}\">+ Add a Key<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 12 · ADD A KEY (type) ============ -->\n        <sc-if value=\"{{ is.addkey }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column\">\n            <div style=\"padding:60px 20px 0;display:flex;align-items:center;gap:12px\">\n              <button onclick=\"{{ back }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(28,28,30,.12);background:#fff;font-size:17px;cursor:pointer\">‹<\u002Fbutton>\n              <span style=\"font:600 11px Inter,sans-serif;letter-spacing:.1em;color:#8a6220;background:rgba(201,151,58,.14);padding:5px 11px;border-radius:999px\">STEP 1 OF 3 · CREATE KEY<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"k-scroll\" style=\"flex:1;overflow-y:auto;padding:18px 20px 20px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:27px;margin:0 0 6px\">What kind of Key is this?<\u002Fh1>\n              <p style=\"margin:0 0 18px;font-size:13.5px;color:#8a857c\">Pick a type. You can add details later — start light.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px\">\n                <sc-for list=\"{{ typeDefs }}\" as=\"t\" hint-placeholder-count=\"8\">\n                  <button onclick=\"{{ pickType }}\" data-id=\"{{ t.id }}\" style=\"{{ t.card }}\">\n                    <span style=\"{{ t.badge }}\"><span style=\"{{ t.dot }}\"><\u002Fspan><\u002Fspan>\n                    <span style=\"font-size:13.5px;font-weight:600\">{{ t.label }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:11px;align-items:flex-start;background:rgba(123,168,153,.12);border:1px solid rgba(123,168,153,.3);border-radius:14px;padding:14px;margin-bottom:8px\">\n                <span style=\"width:26px;height:26px;border-radius:50%;background:#7BA899;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">⚿<\u002Fspan>\n                <p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#3f5f56\">You won't be asked for passwords, full account numbers, or logins here — just enough for your people to find things later.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 20px 26px;background:#F7F4EF\"><button onclick=\"{{ nav }}\" data-screen=\"choosekeeper\" disabled=\"{{ typeLock }}\" style=\"{{ typeBtn }}\">Continue<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 13 · CHOOSE KEEPER ============ -->\n        <sc-if value=\"{{ is.choosekeeper }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column\">\n            <div style=\"padding:60px 20px 0;display:flex;align-items:center;gap:12px\">\n              <button onclick=\"{{ back }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(28,28,30,.12);background:#fff;font-size:17px;cursor:pointer\">‹<\u002Fbutton>\n              <span style=\"font:600 11px Inter,sans-serif;letter-spacing:.1em;color:#8a6220;background:rgba(201,151,58,.14);padding:5px 11px;border-radius:999px\">STEP 2 OF 3 · CHOOSE KEEPER<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"k-scroll\" style=\"flex:1;overflow-y:auto;padding:18px 20px 20px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:27px;margin:0 0 6px\">Who should know this Key exists?<\u002Fh1>\n              <p style=\"margin:0 0 18px;font-size:13.5px;color:#8a857c\">A Keeper knows the Key exists — not what's inside.<\u002Fp>\n              <div style=\"font:600 10.5px Inter,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#1B4F4A;margin-bottom:9px\">From your Trust Circle<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n                <sc-for list=\"{{ keeperDefs }}\" as=\"k\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ pickKeeper }}\" data-id=\"{{ k.id }}\" style=\"{{ k.row }}\">\n                    <span style=\"{{ k.av }}\">{{ k.avatar }}<\u002Fspan>\n                    <div style=\"flex:1\"><div style=\"font-size:14.5px;font-weight:600\">{{ k.label }}<\u002Fdiv><div style=\"font-size:12px;color:#8a857c;margin-top:1px\">{{ k.rel }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:11px;align-items:flex-start;background:rgba(123,168,153,.12);border:1px solid rgba(123,168,153,.3);border-radius:14px;padding:14px\">\n                <span style=\"width:26px;height:26px;border-radius:50%;background:#7BA899;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">✓<\u002Fspan>\n                <p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#3f5f56\">Choosing a Keeper doesn't reveal anything yet. You control what they can see, and when.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 20px 26px;background:#F7F4EF\"><button onclick=\"{{ nav }}\" data-screen=\"unlockrule\" disabled=\"{{ keeperLock }}\" style=\"{{ keeperBtn }}\">Continue<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 14 · SET UNLOCK RULE ============ -->\n        <sc-if value=\"{{ is.unlockrule }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column\">\n            <div style=\"padding:60px 20px 0;display:flex;align-items:center;gap:12px\">\n              <button onclick=\"{{ back }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(28,28,30,.12);background:#fff;font-size:17px;cursor:pointer\">‹<\u002Fbutton>\n              <span style=\"font:600 11px Inter,sans-serif;letter-spacing:.1em;color:#8a6220;background:rgba(201,151,58,.14);padding:5px 11px;border-radius:999px\">STEP 3 OF 3 · UNLOCK RULE<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"k-scroll\" style=\"flex:1;overflow-y:auto;padding:18px 20px 20px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:27px;margin:0 0 14px\">When should this Key unlock?<\u002Fh1>\n              <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:11px;color:#8a857c\">\n                <span style=\"flex:1;text-align:center;padding:7px;border-radius:8px;background:rgba(27,79,74,.08);font-weight:600;color:#1B4F4A\">Alive<\u002Fspan>\n                <span style=\"color:#c9c4ba\">›<\u002Fspan>\n                <span style=\"flex:1;text-align:center;padding:7px;border-radius:8px;background:rgba(27,79,74,.05)\">Incapacitated<\u002Fspan>\n                <span style=\"color:#c9c4ba\">›<\u002Fspan>\n                <span style=\"flex:1;text-align:center;padding:7px;border-radius:8px;background:rgba(27,79,74,.05)\">Death<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n                <sc-for list=\"{{ unlockDefs }}\" as=\"u\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ pickUnlock }}\" data-id=\"{{ u.id }}\" style=\"{{ u.row }}\">\n                    <span style=\"{{ u.radio }}\"><span style=\"{{ u.dot }}\"><\u002Fspan><\u002Fspan>\n                    <div style=\"flex:1\"><div style=\"font-size:15px;font-weight:600\">{{ u.label }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8a857c;margin-top:2px;line-height:1.45\">{{ u.sub }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:11px;align-items:flex-start;background:rgba(123,168,153,.12);border:1px solid rgba(123,168,153,.3);border-radius:14px;padding:14px\">\n                <span style=\"width:26px;height:26px;border-radius:50%;background:#7BA899;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">⚿<\u002Fspan>\n                <p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#3f5f56\">You control what each Keeper can see and when. You can change this anytime.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 20px 26px;background:#F7F4EF\"><button onclick=\"{{ nav }}\" data-screen=\"sealed\" disabled=\"{{ unlockLock }}\" style=\"{{ unlockBtn }}\">Seal this Key<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 17 · SEALED CONFIRMATION ============ -->\n        <sc-if value=\"{{ is.sealed }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:radial-gradient(130% 100% at 50% 20%, #17423d 0%, #0d2926 55%, #081d1b 100%);color:#F7F4EF;display:flex;flex-direction:column;padding:64px 28px 32px\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n              <div style=\"position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:30px\">\n                <span style=\"position:absolute;inset:0;border-radius:50%;border:1px solid rgba(201,151,58,.5);animation:kRing 3.5s ease-out infinite\"><\u002Fspan>\n                <span style=\"position:absolute;inset:0;border-radius:50%;border:1px solid rgba(201,151,58,.5);animation:kRing 3.5s ease-out infinite 1.2s\"><\u002Fspan>\n                <div style=\"width:96px;height:96px;border-radius:50%;background:linear-gradient(150deg,#E4C079,#B9862c);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 34px -8px rgba(201,151,58,.6),inset 0 2px 6px rgba(255,255,255,.4);animation:kGlow 4s ease-in-out infinite\">\n                  <svg width=\"42\" height=\"42\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"9\" r=\"3.4\" fill=\"none\" stroke=\"#12332F\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M9.8 11.6 L14.2 11.6 L15.4 20 L8.6 20 Z\" fill=\"none\" stroke=\"#12332F\" stroke-width=\"1.7\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Cinzel',serif;letter-spacing:.16em;font-size:12px;color:#E4C079;margin-bottom:14px\">SEALED<\u002Fdiv>\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:500;font-size:32px;line-height:1.15;margin:0 0 14px\">Your first Key is sealed.<\u002Fh1>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:rgba(247,244,239,.72);max-width:280px\">You've taken the first step toward making things easier for the people you love.<\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"{{ nav }}\" data-screen=\"home\" style=\"{{ primaryBtn }}\">Continue to Home<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 15 · TRUST CIRCLE ============ -->\n        <sc-if value=\"{{ is.circle }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E\">\n            <div class=\"k-scroll\" style=\"position:absolute;inset:0;overflow-y:auto;padding:64px 20px 100px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:28px;margin:0 0 4px\">Trust Circle<\u002Fh1>\n              <p style=\"margin:0 0 16px;font-size:13.5px;color:#8a857c\">The people who can help when it matters. You decide what each one can see.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:18px\">\n                <sc-for list=\"{{ trustPeople }}\" as=\"p\" hint-placeholder-count=\"5\">\n                  <button onclick=\"{{ nav }}\" data-screen=\"keeperconfirmed\" style=\"text-align:left;width:100%;display:flex;align-items:center;gap:13px;padding:15px;border-radius:18px;border:1px solid rgba(28,28,30,.08);background:#fff;cursor:pointer\">\n                    <span style=\"width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font:600 15px Inter,sans-serif;color:#fff;background:linear-gradient(150deg,#2f6d5f,#1B4F4A)\">{{ p.av }}<\u002Fspan>\n                    <div style=\"flex:1\"><div style=\"font-size:15px;font-weight:600\">{{ p.name }}<\u002Fdiv><div style=\"font-size:12px;color:#8a857c;margin-top:1px\">{{ p.rel }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"{{ p.pill }}\">{{ p.status }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ nav }}\" data-screen=\"keeperinvited\" style=\"{{ primaryBtn }}\">Add Keeper<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ GUIDE TAB ============ -->\n        <sc-if value=\"{{ is.guide }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,#123b36,#0d2926);color:#F7F4EF;display:flex;flex-direction:column\">\n            <div style=\"padding:60px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(247,244,239,.08)\">\n              <div style=\"width:40px;height:40px;border-radius:50%;background:linear-gradient(150deg,#C9973A,#8a6220);display:flex;align-items:center;justify-content:center;flex:none\"><img src=\"697a3ebe-b866-4c5f-a8ed-26529408cd1e\" style=\"width:20px;filter:brightness(0) invert(1);opacity:.92\"><\u002Fdiv>\n              <div><div style=\"font-size:15px;font-weight:600\">Your 3KEES Guide<\u002Fdiv><div style=\"font-size:11px;color:#7BA899\">Always here · never pushy<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"k-scroll\" style=\"flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;animation:kFade .5s ease\">\n              <div style=\"max-width:82%;background:rgba(247,244,239,.07);border:1px solid rgba(201,151,58,.2);border-radius:18px 18px 18px 5px;padding:15px 17px;font-family:'Cormorant Infant',serif;font-size:18px;line-height:1.45;color:#F7ECD4\">Hi {{ displayName }}. There's no rush here — we'll go one Key at a time.<\u002Fdiv>\n              <div style=\"max-width:82%;background:rgba(247,244,239,.07);border:1px solid rgba(201,151,58,.2);border-radius:18px 18px 18px 5px;padding:15px 17px;font-family:'Cormorant Infant',serif;font-size:18px;line-height:1.45;color:#F7ECD4\">Most people start with their Digital Life Key. Shall I set that up with you?<\u002Fdiv>\n              <div style=\"align-self:flex-end;max-width:80%;background:linear-gradient(160deg,#E4C079,#C9973A);color:#12332F;border-radius:18px 18px 5px 18px;padding:13px 16px;font-size:14px;font-weight:500\">Yes, let's do that<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 20px 22px\">\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px\">\n                <span style=\"font-size:12.5px;padding:9px 13px;border-radius:999px;border:1px solid rgba(247,244,239,.2);color:rgba(247,244,239,.85)\">What should I add first?<\u002Fspan>\n                <span style=\"font-size:12.5px;padding:9px 13px;border-radius:999px;border:1px solid rgba(247,244,239,.2);color:rgba(247,244,239,.85)\">Is my data private?<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;background:rgba(247,244,239,.08);border:1px solid rgba(247,244,239,.14);border-radius:16px;padding:14px 16px;color:rgba(247,244,239,.4);font-size:14px\">Ask your Guide anything…<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 16 · PROGRESS TAB ============ -->\n        <sc-if value=\"{{ is.progress }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E\">\n            <div class=\"k-scroll\" style=\"position:absolute;inset:0;overflow-y:auto;padding:64px 20px 100px;animation:kFade .5s ease\">\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:28px;margin:0 0 4px\">Your Legacy Locker<\u002Fh1>\n              <p style=\"margin:0 0 18px;font-size:13.5px;color:#8a857c\">Every Key you add is one less thing your people will have to wonder about.<\u002Fp>\n              <div style=\"background:linear-gradient(160deg,#1B4F4A,#123b36);border-radius:20px;padding:20px;color:#F7F4EF;margin-bottom:20px;display:flex;align-items:center;gap:18px\">\n                <div style=\"width:74px;height:74px;border-radius:50%;flex:none;background:conic-gradient(#E4C079 0turn 0.26turn,rgba(247,244,239,.14) 0.26turn 1turn);display:flex;align-items:center;justify-content:center\"><div style=\"width:56px;height:56px;border-radius:50%;background:#153b37;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:800;font-size:17px;color:#E4C079\">26%<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:15px;font-weight:600;margin-bottom:3px\">A calm, steady start<\u002Fdiv><div style=\"font-size:12.5px;color:rgba(247,244,239,.65);line-height:1.4\">No deadline. Come back whenever life changes.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid rgba(201,151,58,.3);border-radius:20px;padding:18px;margin-bottom:20px\">\n                <div style=\"font-family:'Cinzel',serif;font-weight:800;letter-spacing:.1em;font-size:13px;color:#8a6220;margin-bottom:14px\">TODAY'S 3<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:12px\">\n                  <sc-for list=\"{{ todays3 }}\" as=\"t\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;gap:12px\">\n                      <span style=\"width:34px;height:34px;border-radius:10px;flex:none;background:rgba(201,151,58,.14);display:flex;align-items:center;justify-content:center\"><span style=\"width:12px;height:12px;border-radius:{{ t.shape }};border:1.6px solid #C9973A\"><\u002Fspan><\u002Fspan>\n                      <div style=\"flex:1\"><div style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#a8a49b;font-weight:600\">{{ t.sub }}<\u002Fdiv><div style=\"font-size:13.5px;font-weight:500;color:#33322f;margin-top:1px\">{{ t.label }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"font:600 11px Inter,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#1B4F4A;margin-bottom:12px\">By section<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:14px\">\n                <sc-for list=\"{{ progressSections }}\" as=\"p\" hint-placeholder-count=\"7\">\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px\"><span style=\"font-weight:500\">{{ p.label }}<\u002Fspan><span style=\"color:#8a857c\">{{ p.pct }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:7px;border-radius:4px;background:rgba(28,28,30,.07);overflow:hidden\"><div style=\"height:100%;width:{{ p.pct }};border-radius:4px;background:linear-gradient(90deg,#7BA899,#1B4F4A);transition:width .8s ease\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 18 · EMPTY STATE ============ -->\n        <sc-if value=\"{{ is.empty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column;padding:64px 26px 30px\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n              <svg width=\"96\" height=\"120\" viewBox=\"0 0 96 120\" style=\"margin-bottom:26px\"><circle cx=\"48\" cy=\"42\" r=\"30\" fill=\"none\" stroke=\"rgba(201,151,58,.5)\" stroke-width=\"2\"><\u002Fcircle><circle cx=\"48\" cy=\"42\" r=\"12\" fill=\"rgba(201,151,58,.1)\"><\u002Fcircle><path d=\"M40 52 L56 52 L62 108 L34 108 Z\" fill=\"none\" stroke=\"rgba(201,151,58,.5)\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:28px;line-height:1.2;margin:0 0 12px;max-width:280px\">Your Locker is ready when you are<\u002Fh1>\n              <p style=\"margin:0 0 8px;font-size:15px;line-height:1.6;color:#8a857c;max-width:270px\">Nothing here yet — and that's perfectly fine. The first Key is the hardest, and it only takes three minutes.<\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"{{ nav }}\" data-screen=\"addkey\" style=\"{{ primaryBtn }}\">Create your first Key<\u002Fbutton>\n            <button onclick=\"{{ nav }}\" data-screen=\"home\" style=\"background:none;border:none;color:#8a857c;font:500 13px Inter,sans-serif;padding:16px 0 0;cursor:pointer\">Back to Home<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 19 · REMINDER / ALERT ============ -->\n        <sc-if value=\"{{ is.reminder }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E\">\n            <div class=\"k-scroll\" style=\"position:absolute;inset:0;overflow-y:auto;padding:60px 20px 30px;animation:kFade .5s ease\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px\"><button onclick=\"{{ nav }}\" data-screen=\"home\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(28,28,30,.12);background:#fff;font-size:17px;cursor:pointer\">‹<\u002Fbutton><h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:24px;margin:0\">A few things to review<\u002Fh1><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid rgba(201,151,58,.35);border-radius:18px;padding:18px;margin-bottom:14px\">\n                <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px\"><span style=\"width:36px;height:36px;border-radius:10px;background:rgba(201,151,58,.16);display:flex;align-items:center;justify-content:center;flex:none\"><span style=\"width:12px;height:12px;border-radius:2px;border:1.6px solid #C9973A\"><\u002Fspan><\u002Fspan><div><div style=\"font-size:14.5px;font-weight:600\">Your passport expires soon<\u002Fdiv><div style=\"font-size:12px;color:#8a857c\">Renews in 2 months · Documents<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <p style=\"margin:0 0 14px;font-size:13px;line-height:1.5;color:#55524c\">Want to add a gentle reminder so it doesn't slip by?<\u002Fp>\n                <div style=\"display:flex;gap:10px\"><button style=\"flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(160deg,#E4C079,#C9973A);color:#12332F;font:600 13.5px Inter,sans-serif;cursor:pointer\">Add a reminder<\u002Fbutton><button style=\"padding:12px 18px;border-radius:12px;border:1px solid rgba(28,28,30,.12);background:#fff;color:#55524c;font:500 13.5px Inter,sans-serif;cursor:pointer\">Not now<\u002Fbutton><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:rgba(123,168,153,.1);border:1px solid rgba(123,168,153,.3);border-radius:18px;padding:16px;display:flex;gap:12px;align-items:flex-start\">\n                <span style=\"width:34px;height:34px;border-radius:10px;background:#7BA899;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Cinzel',serif;font-weight:800;font-size:14px\">3<\u002Fspan>\n                <div><div style=\"font-size:14px;font-weight:600;color:#2f5f54\">3 things to check this year<\u002Fdiv><div style=\"font-size:12.5px;color:#4f6f66;margin-top:2px;line-height:1.45\">A calm annual review — beneficiaries, documents, and one new wish.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 20 · KEEPER INVITED ============ -->\n        <sc-if value=\"{{ is.keeperinvited }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column;padding:64px 26px 30px\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n              <div style=\"position:relative;width:76px;height:76px;border-radius:50%;background:rgba(201,151,58,.14);display:flex;align-items:center;justify-content:center;margin-bottom:24px\"><span style=\"width:44px;height:44px;border-radius:50%;background:linear-gradient(150deg,#2f6d5f,#1B4F4A);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px\">SC<\u002Fspan><span style=\"position:absolute;bottom:-2px;right:-2px;width:26px;height:26px;border-radius:50%;background:#C9973A;color:#12332F;display:flex;align-items:center;justify-content:center;font-size:13px;border:3px solid #F7F4EF\">✦<\u002Fspan><\u002Fdiv>\n              <span style=\"{{ pillInvited }}\">Invited<\u002Fspan>\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:26px;line-height:1.2;margin:16px 0 12px\">Invitation sent to Sarah<\u002Fh1>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:#8a857c;max-width:280px\">She'll be asked to accept her role as a Keeper. Until then — and even after — she can't see anything inside your Keys.<\u002Fp>\n              <div style=\"margin-top:22px;background:rgba(123,168,153,.12);border:1px solid rgba(123,168,153,.3);border-radius:14px;padding:14px;display:flex;gap:11px;align-items:flex-start;text-align:left\"><span style=\"width:26px;height:26px;border-radius:50%;background:#7BA899;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px\">🔒<\u002Fspan><p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#3f5f56\">An invitation only shares a name and role — never the contents of a Key.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ nav }}\" data-screen=\"circle\" style=\"{{ primaryBtn }}\">Back to Trust Circle<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 21 · KEEPER CONFIRMED ============ -->\n        <sc-if value=\"{{ is.keeperconfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column;padding:64px 26px 30px\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n              <div style=\"position:relative;width:76px;height:76px;border-radius:50%;background:rgba(123,168,153,.2);display:flex;align-items:center;justify-content:center;margin-bottom:24px\"><span style=\"width:44px;height:44px;border-radius:50%;background:linear-gradient(150deg,#2f6d5f,#1B4F4A);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px\">SC<\u002Fspan><span style=\"position:absolute;bottom:-2px;right:-2px;width:26px;height:26px;border-radius:50%;background:#1B4F4A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;border:3px solid #F7F4EF\">✓<\u002Fspan><\u002Fdiv>\n              <span style=\"{{ pillConfirmed }}\">Confirmed<\u002Fspan>\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:26px;line-height:1.2;margin:16px 0 12px\">Sarah is now a Keeper<\u002Fh1>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:#8a857c;max-width:280px\">She's accepted her role. You're a little more prepared today than you were yesterday — and she'll know exactly what to do when it matters.<\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"{{ nav }}\" data-screen=\"circle\" style=\"{{ primaryBtn }}\">View Trust Circle<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ 22 · LOCKED KEY ============ -->\n        <sc-if value=\"{{ is.lockedkey }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:#F7F4EF;color:#1C1C1E;display:flex;flex-direction:column;padding:60px 24px 30px\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px\"><button onclick=\"{{ back }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(28,28,30,.12);background:#fff;font-size:17px;cursor:pointer\">‹<\u002Fbutton><\u002Fdiv>\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n              <div style=\"position:relative;width:100%;max-width:300px;margin-bottom:26px;border-radius:20px;overflow:hidden;border:1px solid rgba(28,28,30,.1)\">\n                <div style=\"padding:22px;background:linear-gradient(160deg,#efece5,#e6e2da);filter:blur(0.5px)\">\n                  <div style=\"display:flex;align-items:center;gap:13px;opacity:.5\"><span style=\"width:42px;height:42px;border-radius:12px;background:#d8d3c8;flex:none\"><\u002Fspan><div style=\"text-align:left\"><div style=\"height:11px;width:120px;background:#d0cbc0;border-radius:4px\"><\u002Fdiv><div style=\"height:9px;width:80px;background:#d8d3c8;border-radius:4px;margin-top:7px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"position:absolute;inset:0;background:rgba(23,58,53,.55);backdrop-filter:blur(2px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#F7ECD4\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\"><rect x=\"5\" y=\"10.5\" width=\"14\" height=\"10\" rx=\"2.5\" fill=\"none\" stroke=\"#E4C079\" stroke-width=\"1.7\"><\u002Frect><path d=\"M8 10.5 V8 a4 4 0 0 1 8 0 V10.5\" fill=\"none\" stroke=\"#E4C079\" stroke-width=\"1.7\"><\u002Fpath><\u002Fsvg><span style=\"font-family:'Cinzel',serif;letter-spacing:.14em;font-size:11px;color:#E4C079\">SEALED<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <h1 style=\"font-family:'Cormorant Infant',serif;font-weight:600;font-size:26px;line-height:1.2;margin:0 0 12px\">This Key is safely sealed<\u002Fh1>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:#8a857c;max-width:290px\">It exists, and it's protected. Sarah won't see anything inside until your unlock rule is met — <span style=\"color:#1B4F4A;font-weight:600\">after death<\u002Fspan>. Nothing is missing; it's simply waiting.<\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"{{ nav }}\" data-screen=\"circle\" style=\"{{ primaryBtn }}\">Got it<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ BOTTOM NAV (app tabs) ============ -->\n        <sc-if value=\"{{ is.app }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;bottom:0;left:0;right:0;z-index:50;background:rgba(247,244,239,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(28,28,30,.08);padding:10px 8px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:space-around\">\n            <sc-for list=\"{{ navTabs }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ nav }}\" data-screen=\"{{ t.id }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:7px 10px;flex:1\">\n                <span style=\"{{ t.mark }}\"><\u002Fspan>\n                <span style=\"font-size:10.5px;font-weight:600;color:{{ t.color }}\">{{ t.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:924,&quot;height&quot;:900},&quot;motion&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:4,&quot;min&quot;:0,&quot;max&quot;:10,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Parallax intensity&quot;},&quot;driftKeys&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Floating heirloom keys&quot;},&quot;showMap&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Presentation&quot;,&quot;label&quot;:&quot;Show handoff flow-map&quot;}}\">\nclass Component extends DCLogic {\n  order = ['welcome','checkin','reassurance','whatis','coreloop','guideintro','choosepath','activityintro','personalization','paths'];\n  PASSWORD = '3keys';\n  state = { screen:'welcome', history:[], name:'', emotion:null, chips:{}, path:null, choice:null, px:0, py:0, checks:{0:true}, keyType:null, keeper:null, unlock:null, unlocked:false, pwInput:'', pwErr:false };\n\n  emotionDefs = [\n    {id:'relieved',label:'Relieved'},{id:'nervous',label:'Nervous'},{id:'overwhelmed',label:'Overwhelmed'},\n    {id:'responsible',label:'Responsible'},{id:'skeptical',label:'Skeptical'},{id:'other',label:'Something else'}\n  ];\n  chipDefs = [\n    {id:'start',label:\"I don't know where to start\"},{id:'privacy',label:\"I'm worried about privacy\"},\n    {id:'morbid',label:'It feels morbid'},{id:'trust',label:\"I don't know who to trust\"},\n    {id:'accounts',label:'I have too many accounts'},{id:'scattered',label:'My documents are scattered'},\n    {id:'will',label:'I need to update my will/trust'},{id:'business',label:'I own a business'},\n    {id:'insurance',label:'I have insurance policies'},{id:'wishes',label:'I want my wishes known'},\n    {id:'child',label:\"I'm doing this for my child\"},{id:'travel',label:'I want this handled before travel'},\n    {id:'none',label:'None of these'}\n  ];\n\n  reassureMap = {\n    relieved:{t:'Hold on to that feeling.',b:\"That relief is the whole point. We'll turn it into a plan you can actually keep — one Key at a time.\"},\n    nervous:{t:\"That's completely understandable.\",b:\"Most people avoid this because it feels too big. 3KEES breaks it into small steps, one Key at a time.\"},\n    overwhelmed:{t:'One small step is enough.',b:\"You don't have to do it all today. We'll start with a single Key, and the rest can wait for you.\"},\n    responsible:{t:\"That's real love, in action.\",b:\"That care is exactly what the people you love will feel. We'll make it simple to act on — one Key at a time.\"},\n    skeptical:{t:'No pressure. No forms today.',b:\"Fair enough. Nothing to sign, no fees — just three small Keys, and you decide who ever sees them.\"},\n    other:{t:'However you feel is okay.',b:\"Whatever you're carrying, 3KEES breaks this into small steps — one Key at a time.\"}\n  };\n\n  go = (id) => this.setState(s => ({ history:[...s.history, s.screen], screen:id, px:0, py:0 }));\n  back = () => this.setState(s => s.history.length ? { screen:s.history[s.history.length-1], history:s.history.slice(0,-1) } : null);\n  nav = (e) => this.go(e.currentTarget.dataset.screen);\n  restart = () => this.setState({ screen:'welcome', history:[], px:0, py:0 });\n  onName = (e) => this.setState({ name:e.target.value });\n  pickEmotion = (e) => this.setState({ emotion:e.currentTarget.dataset.id });\n  pickChoice = (e) => this.setState({ choice:e.currentTarget.dataset.val });\n  pickPath = (e) => this.setState({ path:e.currentTarget.dataset.id });\n  pickChip = (e) => { const id=e.currentTarget.dataset.id; this.setState(s => { const c={...s.chips}; if(c[id]) delete c[id]; else c[id]=true; return {chips:c}; }); };\n  choiceNext = () => this.go(this.state.choice==='yes' ? 'activityintro' : 'home');\n  onMove = (e) => { const r=e.currentTarget.getBoundingClientRect(); this.setState({ px:((e.clientX-r.left)/r.width-0.5)*2, py:((e.clientY-r.top)/r.height-0.5)*2 }); };\n  onLeave = () => this.setState({ px:0, py:0 });\n  onPw = (e) => this.setState({ pwInput:e.target.value, pwErr:false });\n  submitPw = () => { if (this.state.pwInput.trim().toLowerCase() === this.PASSWORD) this.setState({ unlocked:true, pwErr:false }); else this.setState({ pwErr:true }); };\n  onPwKey = (e) => { if (e.key === 'Enter') this.submitPw(); };\n  componentDidMount() {\n    this._orient = (e) => {\n      const g = e.gamma || 0, b = e.beta || 0;\n      const clamp = (v) => Math.max(-1, Math.min(1, v));\n      this.setState({ px: clamp(g / 22), py: clamp((b - 40) / 22) });\n    };\n    window.addEventListener('deviceorientation', this._orient);\n  }\n  componentWillUnmount() { window.removeEventListener('deviceorientation', this._orient); }\n  toggleCheck = (e) => { const i=e.currentTarget.dataset.i; this.setState(s => { const c={...s.checks}; if(c[i]) delete c[i]; else c[i]=true; return {checks:c}; }); };\n  pickType = (e) => this.setState({ keyType:e.currentTarget.dataset.id });\n  pickKeeper = (e) => this.setState({ keeper:e.currentTarget.dataset.id });\n  pickUnlock = (e) => this.setState({ unlock:e.currentTarget.dataset.id });\n\n  renderVals() {\n    const s = this.state;\n    const scr = s.screen;\n    const ids = [...this.order,'home','keys','circle','guide','progress','addkey','choosekeeper','unlockrule','sealed','empty','reminder','keeperinvited','keeperconfirmed','lockedkey'];\n    const is = {}; ids.forEach(id => is[id] = scr===id);\n    is.onboarding = this.order.includes(scr);\n    is.app = ['home','keys','circle','guide','progress'].includes(scr);\n\n    const motion = (this.props.motion ?? 4) / 4;\n    const driftKeys = this.props.driftKeys ?? true;\n    const showMap = this.props.showMap ?? false;\n    const px=s.px, py=s.py;\n    const tf = (fx,fy) => `translate3d(${(px*fx*motion).toFixed(1)}px, ${(py*fy*motion).toFixed(1)}px, 0)`;\n\n    const primaryBtn = 'width:100%;padding:17px;border-radius:16px;border:none;background:linear-gradient(160deg,#E4C079,#C9973A);color:#12332F;font:600 16px Inter,sans-serif;cursor:pointer;box-shadow:0 10px 26px -8px rgba(201,151,58,.5)';\n    const disBtn = 'width:100%;padding:17px;border-radius:16px;border:1px solid rgba(247,244,239,.14);background:rgba(247,244,239,.05);color:rgba(247,244,239,.35);font:600 16px Inter,sans-serif;cursor:not-allowed';\n    const disBtnLight = 'width:100%;padding:17px;border-radius:16px;border:1px solid rgba(28,28,30,.1);background:rgba(28,28,30,.04);color:rgba(28,28,30,.3);font:600 16px Inter,sans-serif;cursor:not-allowed';\n\n    // emotion chips\n    const chipBase = 'padding:13px 18px;border-radius:999px;border:1px solid rgba(247,244,239,.18);background:rgba(247,244,239,.05);color:#F7F4EF;font:500 14.5px Inter,sans-serif;cursor:pointer;transition:all .22s ease';\n    const chipSel = 'padding:13px 18px;border-radius:999px;border:1px solid #C9973A;backgro
